<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Review Platform</title>
    <style>
      :root {
        --bg: #f0f2f5;
        --ink: #1b2430;
        --muted: #5f6f81;
        --panel: #ffffff;
        --line: #d0d7e0;
        --accent-quant: #0f5ea8;
        --accent-advisory: #0c6b63;
      }
      body {
        margin: 0;
        font-family: "Times New Roman", Georgia, serif;
        background: linear-gradient(180deg, #f9fbfc, var(--bg));
        color: var(--ink);
      }
      main {
        max-width: 1060px;
        margin: 0 auto;
        padding: 40px 20px 60px;
      }
      h1 { margin: 0 0 6px; }
      h2 { margin: 28px 0 12px; font-size: 18px; }
      p { color: var(--muted); line-height: 1.6; }
      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 10px 20px rgba(27, 36, 48, 0.06);
      }
      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 12px;
      }
      .eyebrow.quant { color: var(--accent-quant); }
      .eyebrow.advisory { color: var(--accent-advisory); }
      pre {
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="eyebrow quant">Finance Review Platform</span>
      <h1>Quant Research + Advisory Review</h1>
      <p>
        A unified domain-driven review surface for factor signals, risk posture,
        client suitability, and advisor handoff.
      </p>

      <h2>Quant Domain</h2>
      <div class="grid" id="quant-cards"></div>

      <h2>Advisory Domain</h2>
      <div class="grid" id="advisory-cards"></div>
    </main>
    <script>
      function renderCards(containerId, endpoints, cssClass) {
        Promise.all(endpoints.map(([url]) => fetch(url).then(r => r.json()))).then(items => {
          const container = document.getElementById(containerId);
          items.forEach((payload, i) => {
            const card = document.createElement("section");
            card.className = "card";
            card.innerHTML = `
              <span class="eyebrow ${cssClass}">${endpoints[i][1]}</span>
              <pre>${JSON.stringify(payload, null, 2)}</pre>
            `;
            container.appendChild(card);
          });
        });
      }

      renderCards("quant-cards", [
        ["/api/quant/factor-board", "Factor Board"],
        ["/api/quant/risk-report", "Risk Report"],
        ["/api/quant/execution-posture", "Execution Posture"],
      ], "quant");

      renderCards("advisory-cards", [
        ["/api/advisory/client-suitability", "Client Suitability"],
        ["/api/advisory/portfolio-rationale", "Portfolio Rationale"],
        ["/api/advisory/advisor-handoff", "Advisor Handoff"],
      ], "advisory");
    </script>
  </body>
</html>
